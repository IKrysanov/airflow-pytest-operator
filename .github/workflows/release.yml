name: Release

# Publishes to PyPI when a GitHub Release is published, and attaches the
# SAME built distributions plus a Sigstore attestation bundle to that
# GitHub Release. A SINGLE `build` job produces the artifacts; both the
# PyPI publish job and the GitHub-Release attach job consume that one
# `dist` artifact. The `*.intoto.jsonl` bundle attached to the Release is
# therefore a valid attestation of the actual bytes published to PyPI --
# not a separate rebuild made just to satisfy supply-chain scanners.
#
# OIDC trust setup on PyPI (https://pypi.org/manage/account/publishing/):
#   - Project name:   airflow-pytest-operator
#   - Owner:          IKrysanov
#   - Repository:     airflow-pytest-operator
#   - Workflow name:  release.yml
#   - Environment:    pypi
# Then create a GitHub environment named "pypi" (Settings -> Environments).
#
# Release flow: bump version in pyproject.toml -> tag vX.Y.Z -> publish a
# GitHub Release for that tag. This workflow then builds, signs, publishes
# and attaches.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # Build is isolated and has no elevated permissions, per PyPA guidance:
  # building and publishing live in separate jobs; dists travel as artifacts.
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned by commit SHA, not by floating tag.
      # If an attacker compromises the upstream action and force-pushes its
      # release branch, a tag-based reference would silently execute the new
      # code with our PyPI OIDC permissions; a SHA reference cannot. Update
      # by resolving the new SHA from the upstream release page; the trailing
      # comment names the version so the diff is human-readable.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install build tooling
        # Hash-pinned via --require-hashes (Scorecard Pinned-Dependencies).
        # Regenerate requirements/build.txt from requirements/build.in.
        run: python -m pip install --require-hashes -r requirements/build.txt
      - name: Build sdist and wheel
        run: python -m build
      - name: Check distribution metadata
        run: twine check dist/*
      - name: Verify tag matches package version
        # Guard against publishing a tag that doesn't match pyproject version.
        run: |
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          TAG="${GITHUB_REF_NAME#v}"
          echo "pyproject version: ${PKG_VERSION}, tag: ${TAG}"
          if [ "${PKG_VERSION}" != "${TAG}" ]; then
            echo "::error::Tag ${TAG} does not match pyproject version ${PKG_VERSION}"
            exit 1
          fi
      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The "pypi" environment is where the Trusted Publisher is bound; it also
    # lets you add manual approval/protection rules before a release ships.
    environment:
      name: pypi
      url: https://pypi.org/project/airflow-pytest-operator/
    permissions:
      # Mandatory for Trusted Publishing: lets the job mint an OIDC token
      # that PyPI verifies against the configured publisher. Nothing else.
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        # PEP 740 Sigstore attestations are produced by default since
        # pypa/gh-action-pypi-publish v1.10 (opt-in) / v1.11 (default on)
        # for any project using Trusted Publishing, so the artifacts on
        # PyPI ship with a verifiable link back to this workflow, repo,
        # and commit. See README for end-user verification instructions.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        # No `with:` block needed -- Trusted Publishing authenticates via OIDC.

  attest-and-attach:
    name: Sign distributions and attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Runs in parallel with publish-pypi -- both jobs consume the same `dist`
    # artifact produced by `build`. Failure modes are independent on purpose:
    #   - If publish-pypi fails, the GitHub Release is still signed and the
    #     dists are still attached, which can be useful for diagnosis.
    #   - If this job fails, PyPI publish is unaffected and the package is
    #     still installable via `pip install`. PyPI is the canonical install
    #     path and carries its own PEP 740 attestation from publish-pypi.
    permissions:
      # Mint the Sigstore signing identity via the workflow's OIDC token.
      id-token: write
      # Persist the attestation to the GitHub attestations API.
      attestations: write
      # Attach assets back onto the GitHub Release that triggered this run.
      contents: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Generate Sigstore attestation for the distributions
        id: attest
        # Attesting multiple subjects (wheel + sdist) at once produces a
        # SINGLE bundle file (JSON Lines, one attestation per subject). The
        # `bundle-path` output points at it directly -- no roundtrip through
        # the attestations API, which avoids a persistence/retrieval race.
        #
        # Crucially, this attests the SAME bytes that publish-pypi uploads
        # to PyPI, because both jobs download the same `dist` artifact from
        # `build`. The signature on the GitHub Release is therefore a true
        # attestation of the actually-published distributions, not a
        # provenance claim over a parallel rebuild.
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: "dist/*"

      - name: Assemble release assets
        # Copy the dists plus the attestation bundle into one folder. The
        # bundle is renamed to a *.intoto.jsonl name because (a) that is one
        # of the extensions OpenSSF Scorecard's Signed-Releases check
        # recognises and (b) the raw bundle path lives in $RUNNER_TEMP with
        # a generic name. Each dist therefore ships with verifiable
        # provenance attached to the GitHub Release itself.
        run: |
          set -euo pipefail
          mkdir -p signed
          cp dist/* signed/
          BUNDLE="${{ steps.attest.outputs.bundle-path }}"
          if [ -n "${BUNDLE}" ] && [ -f "${BUNDLE}" ]; then
            cp "${BUNDLE}" "signed/airflow-pytest-operator-${GITHUB_REF_NAME#v}.intoto.jsonl"
          else
            echo "::error::Attestation bundle path not found: '${BUNDLE}'"
            exit 1
          fi
          echo "Assets to attach:"
          ls -la signed/

      - name: Attach assets to the GitHub Release
        # Upload dists + the attestation bundle to the Release that
        # triggered this run. --clobber makes re-runs idempotent.
        run: |
          gh release upload "${GITHUB_REF_NAME}" signed/* \
            --repo "${GITHUB_REPOSITORY}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
