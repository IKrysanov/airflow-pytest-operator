name: Release

# Publishes to PyPI when a GitHub Release is published. Uses PyPI Trusted
# Publishing (OIDC) -- no API tokens or secrets stored in the repo.
#
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   - Project name:   airflow-pytest-operator
#   - Owner:          IKrysanov
#   - Repository:     airflow-pytest-operator
#   - Workflow name:  release.yml
#   - Environment:    pypi
# Then create a GitHub environment named "pypi" (Settings -> Environments).
#
# Release flow: bump version in pyproject.toml -> tag vX.Y.Z -> publish a
# GitHub Release for that tag. This workflow then builds and uploads.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # Build is isolated and has no elevated permissions, per PyPA guidance:
  # building and publishing live in separate jobs; dists travel as artifacts.
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned by commit SHA, not by floating tag.
      # If an attacker compromises the upstream action and force-pushes its
      # release branch, a tag-based reference would silently execute the new
      # code with our PyPI OIDC permissions; a SHA reference cannot. Update
      # by resolving the new SHA from the upstream release page; the trailing
      # comment names the version so the diff is human-readable.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Check distribution metadata
        run: twine check dist/*
      - name: Verify tag matches package version
        # Guard against publishing a tag that doesn't match pyproject version.
        run: |
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          TAG="${GITHUB_REF_NAME#v}"
          echo "pyproject version: ${PKG_VERSION}, tag: ${TAG}"
          if [ "${PKG_VERSION}" != "${TAG}" ]; then
            echo "::error::Tag ${TAG} does not match pyproject version ${PKG_VERSION}"
            exit 1
          fi
      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The "pypi" environment is where the Trusted Publisher is bound; it also
    # lets you add manual approval/protection rules before a release ships.
    environment:
      name: pypi
      url: https://pypi.org/project/airflow-pytest-operator/
    permissions:
      # Mandatory for Trusted Publishing: lets the job mint an OIDC token
      # that PyPI verifies against the configured publisher. Nothing else.
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        # PEP 740 Sigstore attestations are produced by default since
        # pypa/gh-action-pypi-publish v1.10 (opt-in) / v1.11 (default on)
        # for any project using Trusted Publishing, so the artifacts on
        # PyPI ship with a verifiable link back to this workflow, repo,
        # and commit. See README for end-user verification instructions.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        # No `with:` block needed -- Trusted Publishing authenticates via OIDC.
