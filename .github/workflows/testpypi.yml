name: Publish to TestPyPI

# Manual dry-run of the publish pipeline against TestPyPI. Use this before
# the real release to confirm Trusted Publishing, build, and metadata all
# work end-to-end without burning a version on the production index.
#
# One-time setup on TestPyPI (https://test.pypi.org/manage/account/publishing/):
#   - Project name:   airflow-pytest-operator
#   - Owner:          IKrysanov
#   - Repository:     airflow-pytest-operator
#   - Workflow name:  testpypi.yml
#   - Environment:    testpypi
# Then create a GitHub environment named "testpypi".
#
# Trigger: run it manually from the Actions tab (workflow_dispatch).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are SHA-pinned for the same reason as release.yml:
      # the OIDC token issued here is valid against TestPyPI and a compromised
      # action could publish under our identity. Keep this in sync with
      # release.yml when bumping.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Check distribution metadata
        run: twine check dist/*
      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dist-testpypi
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/airflow-pytest-operator/
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: dist-testpypi
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
