name: Publish to TestPyPI

# Manual dry-run of the publish pipeline against TestPyPI. Use this before
# the real release to confirm Trusted Publishing, build, and metadata all
# work end-to-end without burning a version on the production index.
#
# One-time setup on TestPyPI (https://test.pypi.org/manage/account/publishing/):
#   - Project name:   airflow-pytest-operator
#   - Owner:          IKrysanov
#   - Repository:     airflow-pytest-operator
#   - Workflow name:  testpypi.yml
#   - Environment:    testpypi
# Then create a GitHub environment named "testpypi".
#
# Trigger: run it manually from the Actions tab (workflow_dispatch).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Check distribution metadata
        run: twine check dist/*
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-testpypi
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/airflow-pytest-operator/
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-testpypi
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
