name: CodeQL

# Static analysis (SAST) via GitHub CodeQL. Satisfies the OpenSSF Scorecard
# "SAST" check and surfaces security-relevant code issues as Code Scanning
# alerts in the Security tab.
#
# Runs on PR to main (so every change is analysed before merge) and on a
# weekly schedule (so newly-published CodeQL queries catch issues in
# unchanged code). The schedule run is what keeps the SAST coverage current
# even when development is quiet; a `push: main` trigger is omitted because,
# under branch protection, it would only re-analyse code the PR run already
# covered.

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "40 5 * * 1"   # Monday 05:40 UTC, just after the Scorecard run

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload CodeQL results to the Code Scanning dashboard.
      security-events: write
      # Required by the CodeQL action on private repos; harmless on public.
      actions: read
      contents: read

    steps:
      # SHA-pinned like every other workflow in this repo.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          languages: python
          # "security-and-quality" is the broadest built-in query suite;
          # use "security-extended" if quality noise becomes distracting.
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          category: "/language:python"
