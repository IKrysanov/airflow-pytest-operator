name: CodeQL

# Static analysis (SAST) via GitHub CodeQL. Satisfies the OpenSSF Scorecard
# "SAST" check and surfaces security-relevant code issues as Code Scanning
# alerts in the Security tab.
#
# Runs on PR to main (so every change is analysed before merge), on direct
# pushes to main (so commits that land without a PR are still analysed -- this
# is what the Scorecard SAST check measures: "N of 30 commits checked"), and on
# a weekly schedule (so newly-published CodeQL queries catch issues in unchanged
# code). The schedule run keeps SAST coverage current even when development is
# quiet.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "40 5 * * 1"   # Monday 05:40 UTC, just after the Scorecard run

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload CodeQL results to the Code Scanning dashboard.
      security-events: write
      # Required by the CodeQL action on private repos; harmless on public.
      actions: read
      contents: read

    steps:
      # SHA-pinned like every other workflow in this repo.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          languages: python
          # "security-and-quality" is the broadest built-in query suite;
          # use "security-extended" if quality noise becomes distracting.
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          category: "/language:python"
