name: CI

on:
  # PRs are the authoritative gate (branch protection ensures every change
  # reaches main through a PR). We also run on push to main so Codecov has
  # a baseline coverage report for the default branch -- without it, PR
  # coverage diffs against main are inaccurate.
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------
  # Lint + type-check. Runs once on a single modern Python; these tools
  # are version-independent for our purposes.
  # ---------------------------------------------------------------------
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        # Hash-pinned toolchain via --require-hashes (Scorecard Pinned-
        # Dependencies). The package has no runtime deps, so install it
        # editable with --no-deps -- both forms count as pinned.
        run: |
          python -m pip install --require-hashes -r requirements/dev.txt
          python -m pip install -e . --no-deps
      - name: Ruff (lint)
        run: ruff check src tests
      - name: Ruff (format check)
        run: ruff format --check src tests
      - name: Mypy (strict)
        run: mypy

  # ---------------------------------------------------------------------
  # Unit tests across all supported Pythons. Airflow is intentionally NOT
  # installed here: the suite stubs BaseOperator, so this verifies our own
  # code on every interpreter quickly and without heavy dependencies.
  # ---------------------------------------------------------------------
  unit:
    name: Unit (py${{ matrix.python-version }}, no Airflow)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + test deps
        # Same hash-pinned toolchain as the lint job; see note there.
        run: |
          python -m pip install --require-hashes -r requirements/dev.txt
          python -m pip install -e . --no-deps
      - name: Pytest
        # Collect coverage on a single interpreter and upload it; the other
        # matrix cells just run the suite. --cov-report=xml is what Codecov
        # consumes.
        run: |
          if [ "${{ matrix.python-version }}" = "3.12" ]; then
            pytest -q --cov=airflow_pytest_operator --cov-report=xml --cov-report=term-missing
          else
            pytest -q
          fi
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: ./coverage.xml
          flags: unit
          # Pushes to a protected branch (main) require an upload token.
          # Add it as the CODECOV_TOKEN repository secret (Codecov gives it
          # to you when you activate the repo on codecov.io). Fork PRs upload
          # tokenlessly, so a missing secret there is harmless.
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ---------------------------------------------------------------------
  # Integration: install a REAL Airflow and confirm the compat shim and
  # operator import and work against the actual BaseOperator. Only valid
  # Python x Airflow pairings are listed (Airflow 3.2 dropped 3.9; we use
  # widely-deployed pairings here). 3.2.1 is pinned explicitly because it is
  # where the 0.2.1 provider-discovery startup crash first appeared, so it
  # guards against a regression of the lazy-import fix.
  # ---------------------------------------------------------------------
  integration:
    name: Integration (Airflow ${{ matrix.airflow }}, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - airflow: "2.10.3"
            python-version: "3.11"
            constraint: "3.11"
          - airflow: "3.0.6"
            python-version: "3.12"
            constraint: "3.12"
          - airflow: "3.2.1"
            python-version: "3.12"
            constraint: "3.12"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Airflow (with official constraints) + package
        # NOTE: unlike lint/unit, these installs are NOT hash-pinned. Airflow's
        # transitive tree is huge and differs per Airflow/Python pairing;
        # hash-locking it across the matrix would be brittle and break on every
        # Airflow patch. We use Airflow's official constraint files instead --
        # reproducible, just not hash-pinned (Scorecard counts these two as the
        # only remaining unpinned pip commands; accepted trade-off).
        run: |
          # Constraint files make Airflow installs reproducible and avoid
          # dependency resolution blowups. See Airflow install docs.
          CONSTRAINT="https://raw.githubusercontent.com/apache/airflow/constraints-${{ matrix.airflow }}/constraints-${{ matrix.constraint }}.txt"
          pip install "apache-airflow==${{ matrix.airflow }}" --constraint "${CONSTRAINT}"
          pip install -e ".[secure-xml]" "pytest>=7.0"
      - name: Smoke-test import against real Airflow
        run: |
          python -c "import airflow; print('Airflow', airflow.__version__)"
          python -c "from airflow_pytest_operator import PytestOperator; print('operator import OK')"
          python -c "from airflow_pytest_operator.compat import BaseOperator, get_airflow_version; print('compat version tuple:', get_airflow_version())"
      - name: Initialise the Airflow metadata DB
        # Gives the Variable round-trip in tests/test_variable_store_integration.py
        # a real (SQLite) backend to write to. Without it those tests skip the
        # round-trip; with it they exercise the genuine Variable get/set/delete.
        # ``db migrate`` exists on both 2.x (>=2.7) and 3.x; fall back to the
        # legacy ``db init`` just in case.
        run: airflow db migrate || airflow db init
      - name: Run the suite against real Airflow
        # With Airflow present, conftest skips the stub and the operator
        # subclasses the genuine BaseOperator -- this is what proves the
        # 2.x/3.x compatibility claim end-to-end.
        run: pytest -q
